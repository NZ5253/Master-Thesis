# config_env.yaml
vehicle:
  length: 0.36
  width: 0.26
  wheelbase: 0.25
  max_steer: 0.523
  max_steer_rate: 0.5
  max_vel: 1.0
  max_acc: 1.0

dt: 0.1
max_steps: 300

world:
  width: 4.0
  height: 4.0

# --- SCENARIO DEFINITIONS ---
scenarios:
  # 1. PERPENDICULAR
  perpendicular:
    parking:
      bay:
        center_y: 0.0     # bay center along y
        yaw: 1.5708       # 90 deg
    spawn_lane:
      y_min: -1.6
      y_max: -1.3
      x_half_width: 0.8
      yaw: 0.0
    obstacles:
      world: {x_min: -2.0, x_max: 2.0, y_min: -2.0, y_max: 2.0}
      neighbor: {w: 0.26, h: 0.36, offset: 0.40, pos_jitter: 0.05}
      random: {num_min: 0, num_max: 0}  # set to 0 for now (not used yet)

  # 2. PARALLEL
  parallel:
    parking:
      bay:
        center_y: 0.0
        goal_offset_y: -0.10  # rear axle offset from bay center (change to -0.13 if you prefer)
        yaw: 0.0
    spawn_lane:
      y_min: 0.9
      y_max: 1.0
      yaw: 0.0
      # FORCE START AHEAD OF GOAL
      x_min_offset: 0.9      # more room to maneuver
      x_max_offset: 1.3      # keep < 2.0 to stay inside walls
    obstacles:
      world: {x_min: -2.0, x_max: 2.0, y_min: -2.0, y_max: 2.0}
      neighbor: {w: 0.36, h: 0.26, offset: 0.64, pos_jitter: 0.0}  # match parallel layout
      random: {num_min: 0, num_max: 0}
