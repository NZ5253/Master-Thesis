# config_env.yaml
vehicle:
  length: 0.36
  width: 0.26
  wheelbase: 0.25
  max_steer: 0.523
  max_steer_rate: 0.5
  max_vel: 1.0
  max_acc: 1.0

dt: 0.1
max_steps: 300

world:
  width: 4.0
  height: 4.0

scenarios:
  # 1. PERPENDICULAR
  perpendicular:
    parking:
      bay:
        center_y: 0.0          # bay row is at y = 0
        yaw: 1.5708            # 90° (upright car in the bay)
    spawn_lane:
      # Car starts below the bays, driving along +x (from left side)
      y_min: -1.6
      y_max: -1.3
      yaw: 0.0                 # car heading along +x
      x_min_offset: -1.3       # start on the LEFT of goal
      x_max_offset: -0.9       # closer to centre but still left
    success:
        v_tol: 0.06
        yaw_tol: 0.08
        perp_pos_tol: 0.08
    obstacles:
      world: {x_min: -2.0, x_max: 2.0, y_min: -2.0, y_max: 2.0}
      neighbor:
        w: 0.36                # car width (across bay)
        h: 0.26                # car length (into bay)
        offset: 0.40           # left/right distance from bay center
        pos_jitter: 0.0        # NO randomness for now
      random: {num_min: 0, num_max: 0}  # disable random obstacles

    # 2. PARALLEL (keep whatever you already have working)
  parallel:
    parking:
      bay:
        center_y: 0.13
        yaw: 0.0

    # --- ADD THIS (this is your B) ---
    approach_pose:
      y: 0.96
      yaw: 0.0
      x_offset: 1.00   # B is 1.0m ahead of goal_x (rear-axle goal)

    spawn_lane:
      y_min: 0.96
      y_max: 0.96
      yaw: 0.0
      x_min_offset: 1.60   # A is 1.6m ahead
      x_max_offset: 1.60

    success:
        v_tol: 0.06
        yaw_tol: 0.08
        parallel_along_tol: 0.05
        parallel_lateral_tol: 0.05

    obstacles:
      world: {x_min: -2.0, x_max: 2.0, y_min: -2.0, y_max: 2.0}
      neighbor: {w: 0.36, h: 0.26, offset: 0.54, pos_jitter: 0.0}
      random: {num_min: 0, num_max: 0}
