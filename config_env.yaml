# config_env.yaml
vehicle:
  length: 0.36
  width: 0.26
  wheelbase: 0.25
  max_steer: 0.523
  max_steer_rate: 0.5
  max_vel: 1.0
  max_acc: 1.0

dt: 0.1
max_steps: 300

world:
  width: 4.0
  height: 4.0

# --- SCENARIO DEFINITIONS ---
scenarios:
  # 1. PERPENDICULAR
  perpendicular:
    goal: [0.0, 0.0, 1.5708] # 90 deg
    parking:
      bay:
        yaw: 1.5708
      neighbor:
        w: 0.26
        h: 0.36
        offset: 0.40  # Left/Right offset
        pos_jitter: 0.05
    spawn_lane:
      y_min: -1.6
      y_max: -1.3
      x_half_width: 0.8
      yaw: 0.0
    obstacles:
      world: {x_min: -2.0, x_max: 2.0, y_min: -2.0, y_max: 2.0}
      neighbor: {w: 0.26, h: 0.36, offset: 0.40, pos_jitter: 0.05}
      random: {num_min: 1, num_max: 2}

  # 2. PARALLEL
  parallel:
    goal: [0.0, 0.0, 0.0]  # 0 deg
    parking:
      bay:
        center_y: 0.0
        goal_offset_y: -0.10
        yaw: 0.0
      neighbor:
        w: 0.36
        h: 0.26
        offset: 0.54      # FIXED: Gap = 0.64m (Fits car)
        pos_jitter: 0.0
    spawn_lane:
          y_min: 0.9
          y_max: 1.0
          yaw: 0.0
          # FORCE START AHEAD OF GOAL
          x_min_offset: 0.9    # Changed from 1.5 (Give it more room to maneuver)
          x_max_offset: 1.3    # Changed from 3.0 (Must be < 2.0 to stay inside walls!)

    obstacles:
      world: {x_min: -2.0, x_max: 2.0, y_min: -2.0, y_max: 2.0}
      neighbor: {w: 0.36, h: 0.26, offset: 0.54, pos_jitter: 0.0} # Match parking
      random: {num_min: 0, num_max: 0}