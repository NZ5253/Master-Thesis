# mpc/config_mpc.yaml
# Common configuration for TEB-style MPC.

vehicle:
  length: 0.36        # [m] CRC footprint (approx)
  width: 0.26         # [m]
  wheelbase: 0.25     # [m]
  max_steer: 0.523    # [rad]
  max_steer_rate: 0.5 # [rad/s]
  max_vel: 1.0        # [m/s]
  max_acc: 1.0        # [m/s^2]

environment:
  size_x: 4.0         # [m]
  size_y: 4.0         # [m]
  safety_margin: 0.0 # [m] Reduced margin for tight maneuvers

mpc:
  # match ParkingEnv dt
  dt: 0.1                 # [s]
  horizon_steps: 80       # 5.0s horizon (Critical for Parallel Parking)
  max_iter: 200

  # Global weights (defaults)
  w_goal_xy: 80.0
  w_goal_theta: 80.0
  w_goal_v: 0.5           # penalise non-zero speed near goal

  # lighter smoothing so it can manoeuvre
  w_steer: 1.0
  w_accel: 0.1
  w_smooth_steer: 0.01
  w_smooth_accel: 0.02

  # obstacle cost (increased to prevent collisions in tight gaps)
  w_collision: 40.0
  alpha_obs: 3.0

  # world boundary penalty (stay inside 4x4 box)
  w_boundary: 30.0
  boundary_margin: 0.2

  profiles:
    parallel:
      w_goal_xy: 350.0        # Lower priority on exact center
      w_goal_theta: 80.0    # HIGH priority on being straight
      w_steer: 0.1       # Cheap steering
      w_accel: 0.1
      w_smooth_steer: 0.01   # Allow fast counter-steering
      w_smooth_accel: 0.01
      w_reverse_penalty: 0.08 # CRITICAL: Free reversing!
      w_collision: 25.0

    perpendicular:
      w_goal_xy: 80.0
      w_goal_theta: 50.0
      w_reverse_penalty: 0.1