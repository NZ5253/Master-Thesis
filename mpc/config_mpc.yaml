# mpc/config_mpc.yaml
# Only MPC-specific settings. Vehicle + world + dt come from config_env.yaml.

mpc:
  # Horizon / solver
  horizon_steps: 80       # 5.0s horizon (critical for parallel parking)
  max_iter: 200

  # Global weights (defaults)
  w_goal_xy: 80.0
  w_goal_theta: 80.0
  w_goal_v: 0.5           # penalise non-zero speed near goal

  # Control effort + smoothing
  w_steer: 1.0
  w_accel: 0.1
  w_smooth_steer: 0.01
  w_smooth_accel: 0.02

  # Obstacle / collision cost
  w_collision: 40.0       # high to avoid contacts in tight gaps
  alpha_obs: 3.0          # shape of obstacle potential (used inside MPC)

  # World boundary penalty (stay inside 4x4 box)
  w_boundary: 30.0
  boundary_margin: 0.2

  # Default reverse penalty (profile can override)
  w_reverse_penalty: 0.1

  # Scenario-specific profile overrides
  profiles:
    parallel:
      # 1) Stronger pull into the slot and to be straight
      w_goal_xy: 400.0         # was 350
      w_goal_theta: 120.0      # was 80
      w_goal_v: 0.1            # ↓ less penalty for moving near goal

      # 2) Controls: allow more decisive moves, less zig-zag
      w_steer: 0.1
      w_accel: 0.05            # slightly cheaper accel/brake
      w_smooth_steer: 0.002    # ↓ much weaker smoothing
      w_smooth_accel: 0.004    # ↓ much weaker smoothing

      # 3) Reversing & collisions
      w_reverse_penalty: 0.12  # ↑ discourages tiny back/forth dithering
      w_collision: 20.0        # slightly softer than 25 – helps get closer to curb


    perpendicular:
      w_goal_xy: 80.0
      w_goal_theta: 50.0
      w_reverse_penalty: 0.1
