# mpc/config_mpc.yaml
# Only MPC-specific settings. Vehicle + world + dt come from config_env.yaml.

mpc:
  # Horizon / solver
  horizon_steps: 80       # 8.0s horizon (original working config)
  max_iter: 200

  # Global weights (defaults)
  w_goal_xy: 80.0
  w_goal_theta: 80.0
  w_goal_v: 0.5

  # Control effort + smoothing
  w_steer: 1.0
  w_accel: 0.1
  w_smooth_steer: 0.01
  w_smooth_accel: 0.02

  # Obstacle / collision cost
  w_collision: 40.0
  alpha_obs: 3.0

  # World boundary penalty (stay inside 4x4 box)
  w_boundary: 30.0
  boundary_margin: 0.2

  # Default reverse penalty (profile can override)
  w_reverse_penalty: 0.1

  # Scenario-specific profile overrides
  profiles:
    parallel:
      # Smooth human-like parking: monotonic depth, minimal zig-zag
      w_goal_xy: 400.0
      w_goal_theta: 120.0
      w_goal_v: 0.1

      w_steer: 0.1               # Moderate steering cost
      w_accel: 0.05              # Moderate acceleration cost
      w_smooth_steer: 0.0015     # Very weak smoothing - allow single decisive maneuver
      w_smooth_accel: 0.003      # Very weak smoothing

      w_reverse_penalty: 0.12    # Moderate reverse penalty
      w_collision: 25.0          # Slightly higher for safety

    perpendicular:
      # Smooth perpendicular parking
      w_goal_xy: 200.0         # Match parallel for consistency
      w_goal_theta: 100.0      # Match parallel for consistency
      w_goal_v: 1.0
      w_steer: 0.3
      w_accel: 0.1
      w_smooth_steer: 1.0      # Strong smoothing
      w_smooth_accel: 0.4
      w_reverse_penalty: 0.08
      w_collision: 35.0        # Slightly higher for tighter spaces

